<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twifo Hemang Shalom School</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='images/logo.jpeg') }}">
</head>
<body>

    <header>
        <div class="logo">
            <a href="/">
                <img src="{{ url_for('static', filename='images/logo.jpeg') }}" alt="Twifo Hemang Shalom School Logo" style="height: 50px; width: auto; display: block;">
            </a>
        </div>
        <nav>
            <a href="{{ url_for('home') }}" class="{% if request.path == '/' %}active-link{% endif %}">Home</a>
            <a href="{{ url_for('about') }}" class="{% if request.path == '/about' %}active-link{% endif %}">About Us</a>
            <a href="{{ url_for('academics') }}" class="{% if request.path == '/academics' %}active-link{% endif %}">Academics</a>
            <a href="{{ url_for('admissions') }}" class="{% if request.path == '/admissions' %}active-link{% endif %}">Admissions</a>
            <a href="{{ url_for('alumni') }}" class="{% if request.path == '/alumni' %}active-link{% endif %}">Alumni</a>
            <a href="{{ url_for('support') }}" class="{% if request.path == '/support' %}active-link{% endif %}">Student Support</a>

            {% if session.get('is_admin') %}
                <a href="{{ url_for('admin_dashboard') }}" class="{% if request.path == '/admin/dashboard' %}active-link{% endif %}">
                    Admin Control
                </a>
                <a href="{{ url_for('admin_logout') }}" style="color: #ff6b6b; margin-left: 15px; text-decoration: none; font-weight: bold;">
                    Exit Admin
                </a>
            {% endif %}
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

   <div class="chat-widget" onclick="toggleChat()">
    <svg id="chat-svg-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 20px; height: 20px; display: block; transition: stroke 0.3s ease;">
        <path d="M21 11.5C21 15.6421 16.9706 19 12 19C10.5135 19 9.11717 18.6946 7.87654 18.1519L3 19.5L4.51201 15.216C3.55106 14.1539 3 12.8856 3 11.5C3 7.35786 7.02944 4 12 4C16.9706 4 21 7.35786 21 11.5Z" 
              stroke="var(--color-blue)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M8 11H8.01M12 11H12.01M16 11H16.01" 
              stroke="var(--color-blue)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <strong style="margin-left: 8px; line-height: 1;">Chat</strong>
</div>

    <div class="chat-box-container" id="chatBox">
        <div class="chat-header">
            <div style="display: flex; align-items: center; gap: 8px;">
                <div class="bot-status-dot"></div>
                <div>
                    <h4 style="margin: 0; font-size: 0.95rem;">THS Assistant</h4>
                    <span style="font-size: 0.75rem; opacity: 0.85;">Online • Ready to help</span>
                </div>
            </div>
            <button class="chat-close-btn" onclick="toggleChat()">&times;</button>
        </div>

        <div class="chat-messages-body" id="chatMessages">
            <div class="message bot-msg">
                Welcome to Twifo Hemang Shalom School! How can I help you today?
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
            <button id="chatSendBtn" onclick="sendUserMessage()">Send</button>
        </div>
    </div>

   <script>
        function toggleChat() {
            const chatBox = document.getElementById('chatBox');
            chatBox.classList.toggle('active');
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendUserMessage();
            }
        }

        async function sendUserMessage() {
            const inputField = document.getElementById('chatInput');
            const messageText = inputField.value.trim();
            if (messageText === '') return;

            const chatMessages = document.getElementById('chatMessages');

            // 1. Render User Bubble
            const userDiv = document.createElement('div');
            userDiv.className = 'message user-msg';
            userDiv.textContent = messageText;
            chatMessages.appendChild(userDiv);

            inputField.value = '';
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // 2. Render Temporary "Typing..." Placeholder
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot-msg';
            typingDiv.id = 'bot-typing-indicator';
            typingDiv.textContent = 'Thinking...';
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // 3. Request Answer from Backend AI Route
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: messageText })
                });
                const data = await response.json();
                
                // Remove typing indicator and show true response
                document.getElementById('bot-typing-indicator').remove();
                
                const botDiv = document.createElement('div');
                botDiv.className = 'message bot-msg';
                botDiv.textContent = data.reply;
                chatMessages.appendChild(botDiv);
                
            } catch (error) {
                document.getElementById('bot-typing-indicator').remove();
                const errorDiv = document.createElement('div');
                errorDiv.className = 'message bot-msg';
                errorDiv.textContent = "Sorry, I'm having trouble connecting to the school server right now.";
                chatMessages.appendChild(errorDiv);
            }
            
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>

</body>
</html>
